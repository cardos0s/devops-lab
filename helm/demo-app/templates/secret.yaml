# Gera o Secret do banco a partir de .Values.db.password (passado no deploy).
# Falha de propósito se a senha não for informada — evita subir com senha vazia.
{{- if not .Values.db.password }}
{{- fail "Defina db.password no deploy: --set db.password=<senha-forte>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.db.password | quote }}
