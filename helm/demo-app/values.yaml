# Valores padrão do chart. Sobrescreva com --set ou -f meu-values.yaml.
namespace: demo-app

web:
  image: ghcr.io/cardos0s/demo-app-web
  tag: latest
  replicas: 2
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 64Mi }

api:
  image: ghcr.io/cardos0s/demo-app-api
  tag: latest
  replicas: 2
  env:
    APP_ENV: production
    WELCOME_MESSAGE: "Bem-vinda ao DevOps Lab (Helm)"
  resources:
    requests: { cpu: 50m, memory: 96Mi }
    limits: { cpu: 300m, memory: 256Mi }

db:
  image: postgres:15-alpine
  database: app
  user: app
  # Senha: NÃO coloque a real aqui. Passe em deploy com:
  #   --set db.password=$(openssl rand -base64 24)
  password: ""
  storage: 1Gi

ingress:
  enabled: true
  host: demo.local
