# Service — dá um endereço estável (IP + DNS interno) para um conjunto de pods.
# Os pods sobem e morrem com IPs diferentes; o Service abstrai isso e
# distribui tráfego entre as réplicas que casam com o selector.
#
# Tipos comuns:
#   ClusterIP  -> acessível só dentro do cluster (padrão)
#   NodePort   -> expõe numa porta de cada nó (30000-32767)
#   LoadBalancer -> provisiona um LB externo (em cloud)
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: lab
spec:
  type: NodePort
  selector:
    app: nginx                     # roteia para os pods do Deployment nginx
  ports:
    - port: 80                     # porta do Service (dentro do cluster)
      targetPort: 80               # porta do container
      nodePort: 30080              # porta exposta no nó (acesso externo no Kind)
