# Ingress — roteamento HTTP(S) de fora do cluster para Services internos,
# baseado em host e path. Requer um Ingress Controller instalado
# (ex.: ingress-nginx). Substitui a necessidade de vários NodePorts/LoadBalancers.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lab-ingress
  namespace: lab
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: lab.local              # adicione "127.0.0.1 lab.local" no /etc/hosts
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
