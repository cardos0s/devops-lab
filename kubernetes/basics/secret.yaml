# Secret — guarda dados sensíveis (senhas, tokens, chaves).
# ATENÇÃO: por padrão Secrets são apenas base64 (NÃO criptografados em repouso
# sem configuração extra). NUNCA commite Secrets reais — este é um EXEMPLO com
# valores fictícios. Em produção use Sealed Secrets, SOPS ou um cofre externo
# (Vault, AWS Secrets Manager, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: lab
type: Opaque
stringData:                        # stringData aceita texto puro (k8s codifica)
  DB_PASSWORD: "exemplo-troque-em-producao"
  API_KEY: "exemplo-nao-use-de-verdade"
