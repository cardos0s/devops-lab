# Sobe o stack completo localmente (web + api + postgres) sem Kubernetes.
# Útil para desenvolver e testar antes de levar pro cluster.
#
#   docker compose up --build
#   web  -> http://localhost:8000
#   api  -> http://localhost:8000/api  (proxy via nginx) ou http://localhost:8080/api
services:
  web:
    build: ./web
    ports:
      - "8000:80"
    depends_on:
      - api

  api:
    build: ./api
    environment:
      APP_ENV: development
      WELCOME_MESSAGE: "Bem-vinda ao DevOps Lab (compose)"
      ConnectionStrings__Default: "Host=db;Port=5432;Database=app;Username=app;Password=${DB_PASSWORD:-changeme}"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
