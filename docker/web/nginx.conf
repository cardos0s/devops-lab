# Config nginx do frontend: serve arquivos estáticos e faz proxy de /api para a API.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Encaminha chamadas /api para o serviço da API (nome DNS interno no compose/k8s)
    location /api {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
