# EXEMPLO — valores fictícios. Em produção, gere via:
#   kubectl create secret generic db-secret \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -base64 24) -n demo-app
# ...ou use Sealed Secrets / SOPS / Vault. Nunca commite a senha real.
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: demo-app
type: Opaque
stringData:
  POSTGRES_PASSWORD: "troque-isto-em-producao"
