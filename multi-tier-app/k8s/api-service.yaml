apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo-app
spec:
  type: ClusterIP                  # acessível só dentro do cluster (web + ingress falam com ele)
  selector:
    app: api
  ports:
    - name: http               # nome referenciado pelo ServiceMonitor
      port: 8080
      targetPort: 8080
