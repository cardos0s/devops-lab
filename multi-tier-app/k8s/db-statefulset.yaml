# StatefulSet — para apps com ESTADO (banco de dados).
# Diferente de um Deployment: identidade de rede estável (db-0) e
# armazenamento persistente por réplica via volumeClaimTemplates.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db
  namespace: demo-app
spec:
  serviceName: db                  # casa com o Service headless
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "app"]
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:            # cada réplica ganha seu PersistentVolume
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
